<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="registration-container">
    <section class="card">
      <header class="card-header">
        <h1 class="card-title">Welcome back</h1>
        <p class="card-subtitle">Sign in to your account</p>
      </header>

      <form id="loginForm" class="card-body" method="post" action="/login" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email address</label>
          <input id="loginEmail" name="email" type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" name="password" type="password" placeholder="Enter password" required autocomplete="current-password" />
        </div>

        <div class="form-group" style="display:flex;align-items:center;justify-content:space-between;">
          <label style="font-size:13px;color:var(--muted);">
            <input id="remember" name="remember" type="checkbox" style="margin-right:8px" /> Remember me
          </label>
          <!-- <a class="muted-link" href="#" aria-label="reset-password.html">Forgot password?</a>  -->
           <a class="muted-link" href="forgot-password.html">Forgot password?</a>
          


        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Sign in</button>
          <a class="muted-link" href="registration-form.html" aria-label="Create account">Create account</a>
        </div>

        <div id="loginMessage" class="form-message" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script >
   

    document.addEventListener("DOMContentLoaded", function () {

      const form = document.getElementById("loginForm");

      if (form) {
        form.addEventListener("submit", async function (e) {
          e.preventDefault();

          const loginMessage = document.getElementById("loginMessage");

          const data = {
            emailId: document.getElementById("loginEmail").value.trim(),
            password: document.getElementById("loginPassword").value.trim()
          };

          if (!data.emailId || !data.password) {
            loginMessage.style.color = "red";
            loginMessage.innerText = "Please enter email and password";
            return;
          }

          try {
            // ✅ LOGIN CALL
            const response = await fetch("http://localhost:8619/api/auth/login", {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              credentials: "include",
              body: JSON.stringify(data)
            });

            if (!response.ok) {
              const error = await response.text();
              loginMessage.style.color = "red";
              loginMessage.innerText = error || "Login failed";
              return;
            }

            // ✅ STEP 2: GET USER ROLE
            const profileRes = await fetch("http://localhost:8619/api/user/profile", {
              method: "GET",
              credentials: "include"
            });

            if (!profileRes.ok) {
              throw new Error("Failed to fetch user profile");
            }

            const user = await profileRes.json();

            const role = user.role; // ✅ IMPORTANT

            // ✅ REDIRECT BASED ON ROLE
            if (role === "CUSTOMER") {
              window.location.href = "http://localhost:4200/customer-dashboard";
            } else if (role === "CRO") {
              window.location.href = "http://localhost:4200/support-dashboard";
            } else if (role === "ADMIN") {
              window.location.href = "http://localhost:4200/manager-dashboard";
            } else {
              window.location.href = "http://localhost:4200/login";
            }

          } catch (error) {
            loginMessage.style.color = "red";
            loginMessage.innerText = "❌ Server error. Try again.";
          }
        });
      }

    });
</script>

  </script>
</body>
</html>
