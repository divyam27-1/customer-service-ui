<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Support Dashboard</title>
  <style>
    :root{
      --bg-100:#f5fbff; --blue-300:#7fbfff; --blue-500:#2b9aff; --blue-600:#1f7fd6;
      --card-bg:#ffffff; --muted:#6b7280; --radius:12px; --shadow:0 18px 50px rgba(16,45,83,0.06);
      --border: rgba(43,154,255,0.10);
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }
    html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg-100),#f8fbff);}
    .support-dashboard{min-height:100vh;display:flex;flex-direction:row;gap:0;align-items:stretch}
    .sidebar{
      width:300px;min-width:220px;background:linear-gradient(180deg,#fff,#fbfdff);
      border-right:1px solid rgba(43,154,255,0.06);padding:28px;box-sizing:border-box;
      display:flex;flex-direction:column;gap:18px
    }
    .brand{display:flex;align-items:center;gap:14px}
    .logo{width:54px;height:54px;border-radius:12px;background:linear-gradient(180deg,var(--blue-500),var(--blue-600));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px}
    .acct{display:flex;flex-direction:column}
    .acct .name{font-weight:800}
    .acct .sub{font-size:13px;color:var(--muted)}
    .nav{margin-top:6px;display:flex;flex-direction:column;gap:8px}
    .nav button{
      background:transparent;border:0;padding:12px 14px;border-radius:10px;text-align:left;cursor:pointer;
      font-weight:700;color:#0f172a;font-size:15px
    }
    .nav button:hover{background:rgba(43,154,255,0.04)}
    .nav button.active{background:linear-gradient(90deg,var(--blue-300),var(--blue-500));color:#fff;box-shadow:0 8px 20px rgba(43,154,255,0.12)}
    .sidebar .footer{margin-top:auto;font-size:13px;color:var(--muted)}
    .sidebar a{color:inherit}
    .main{flex:1;padding:28px 36px;box-sizing:border-box;display:flex;flex-direction:column;gap:18px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .topbar h1{margin:0;font-size:20px}
    .panel-wrap{flex:1;display:flex;gap:22px;align-items:flex-start}
    .tickets-panel{width:420px;max-width:40%;background:var(--card-bg);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);min-height:360px;box-sizing:border-box;display:flex;flex-direction:column;}
    .ticket-filters{display:flex;gap:8px;margin-bottom:14px;}
    .ticket-filters button{padding:7px 16px;border-radius:8px;border:0;background:#f3f6fb;color:#0f172a;font-weight:600;cursor:pointer}
    .ticket-filters button.active{background:linear-gradient(90deg,var(--blue-300),var(--blue-500));color:#fff;}
    .ticket-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
    .ticket-item{
      background:#f8fbff;border-radius:10px;padding:12px 14px;box-shadow:0 2px 8px rgba(16,45,83,0.03);
      border:1px solid rgba(43,154,255,0.04);cursor:pointer;transition:box-shadow .12s;
      display:flex;flex-direction:column;gap:3px;
    }
    .ticket-item.selected{border:2px solid var(--blue-500);box-shadow:0 4px 18px rgba(43,154,255,0.10);}
    .ticket-item .meta{font-size:12px;color:var(--muted);display:flex;gap:10px;}
    .ticket-item .subject{font-weight:700;}
    .ticket-item .status{font-size:12px;padding:2px 10px;border-radius:8px;display:inline-block;}
    .status-new{background:#eaf6ff;color:var(--blue-600);}
    .status-pending{background:#fffbe6;color:#bfa100;}
    .status-completed{background:#e6ffe6;color:#2f855a;}
    .ticket-item .user{font-size:12px;color:#888;}
    .details-panel{
      flex:1;background:var(--card-bg);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);min-height:360px;box-sizing:border-box;
      margin-left:0;display:flex;flex-direction:column;gap:18px;
    }
    .details-panel[hidden]{display:none;}
    .details-header{display:flex;align-items:center;gap:16px;}
    .details-header .avatar{width:48px;height:48px;border-radius:12px;background:linear-gradient(180deg,var(--blue-500),var(--blue-600));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;}
    .details-header .info{flex:1;}
    .details-header .info .name{font-weight:700;}
    .details-header .info .email{font-size:13px;color:var(--muted);}
    .details-section{margin-top:8px;}
    .details-section label{font-size:13px;color:var(--muted);font-weight:700;}
    .details-section .value{margin-bottom:8px;}
    .details-section .desc{background:#f8fbff;padding:10px;border-radius:8px;}
    .details-actions{margin-top:16px;display:flex;gap:10px;}
    .details-actions button{padding:9px 18px;border-radius:8px;border:0;font-weight:700;cursor:pointer;}
    .btn-complete{background:linear-gradient(90deg,#2f855a,#38b2ac);color:#fff;}
    .btn-pending{background:linear-gradient(90deg,#bfa100,#ffd600);color:#fff;}
    .btn-comment{background:#f3f6fb;}
    .comment-box{margin-top:12px;}
    .comment-box textarea{width:100%;min-height:60px;padding:8px 10px;border-radius:8px;border:1px solid #e8f2ff;font-size:14px;}
    .comment-list{margin-top:10px;}
    .comment{background:#f3f6fb;padding:8px 10px;border-radius:8px;margin-bottom:6px;font-size:13px;}
    @media (max-width:1100px){ .tickets-panel{max-width:100%} }
    @media (max-width:880px){
      .support-dashboard{flex-direction:column}
      .sidebar{width:100%;min-width:unset;flex:0 0 auto;display:flex;overflow:auto}
      .panel-wrap{flex-direction:column}
      .tickets-panel,.details-panel{width:100%;max-width:100%;}
      .main{padding:18px}
      .sidebar{padding:18px}
    }
  </style>
</head>
<body>
  <div class="support-dashboard" role="application">
    <aside class="sidebar" role="navigation" aria-label="Support navigation">
      <div class="brand">
        <div class="logo">S</div>
        <div class="acct">
          <div class="name">Support Team</div>
          <div class="sub">Support dashboard</div>
        </div>
      </div>
      <nav class="nav" aria-label="Main navigation">
        <button class="active">Tickets</button>
      </nav>
      <div class="footer">
        <div class="muted">Signed in as: support@example.com</div>
        <div style="margin-top:10px;"><a href="../login.html" class="muted">Logout</a></div>
      </div>
    </aside>
    <main class="main">
      <div class="topbar">
        <h1>Tickets</h1>
      </div>
      <div class="panel-wrap">
        <!-- Ticket list panel -->
        <section class="tickets-panel">
          <div class="ticket-filters">
            <button class="active" data-filter="all">All</button>
            <button data-filter="new">New</button>
            <button data-filter="pending">Pending</button>
            <button data-filter="completed">Completed</button>
          </div>
          <div class="ticket-list" id="ticketList"></div>
        </section>
        <!-- Details panel -->
        <section class="details-panel" id="detailsPanel" hidden>
          <div class="details-header">
            <div class="avatar" id="userAvatar">U</div>
            <div class="info">
              <div class="name" id="userName">User Name</div>
              <div class="email" id="userEmail">user@email.com</div>
            </div>
          </div>
          <div class="details-section">
            <label>Ticket ID:</label>
            <div class="value" id="ticketId"></div>
            <label>Category:</label>
            <div class="value" id="ticketCategory"></div>
            <label>Subcategory:</label>
            <div class="value" id="ticketSubcategory"></div>
            <label>Status:</label>
            <div class="value" id="ticketStatus"></div>
            <label>Date:</label>
            <div class="value" id="ticketDate"></div>
            <label>Description:</label>
            <div class="desc" id="ticketDescription"></div>
          </div>
          <div class="details-actions">
            <button class="btn-complete" id="markCompleteBtn">Mark as Completed</button>
            <button class="btn-pending" id="markPendingBtn">Mark as Pending</button>
          </div>
          <div class="comment-box">
            <label for="commentInput">Add Comment/Remark:</label>
            <textarea id="commentInput" placeholder="Add a remark or update for this ticket"></textarea>
            <button class="btn-comment" id="addCommentBtn">Add Comment</button>
          </div>
          <div class="comment-list" id="commentList"></div>
        </section>
      </div>
    </main>
  </div>
  <script>
    // Dummy data
    const users = {
      "U1001": { name: "Abhinav Sharma", email: "abhinav@email.com" },
      "U1002": { name: "Priya Singh", email: "priya@email.com" },
      "U1003": { name: "Rahul Mehra", email: "rahul@email.com" }
    };
    let tickets = [
      {
        id: "T2024",
        user_id: "U1001",
        category: "Internet Banking",
        subcategory: "Password reset",
        description: "Unable to reset password via portal.",
        status: "new",
        date: "2024-06-01",
        comments: [
          { by: "Support", text: "Checked logs, no reset attempt found.", date: "2024-06-02" }
        ]
      },
      {
        id: "T2025",
        user_id: "U1002",
        category: "Account Services",
        subcategory: "Address update",
        description: "Request to update address to 123 New Lane.",
        status: "pending",
        date: "2024-06-02",
        comments: []
      },
      {
        id: "T2026",
        user_id: "U1003",
        category: "Complaints",
        subcategory: "Transaction dispute",
        description: "Dispute for transaction #TXN1234 on 2024-05-30.",
        status: "completed",
        date: "2024-06-03",
        comments: [
          { by: "Support", text: "Dispute resolved, amount refunded.", date: "2024-06-04" }
        ]
      }
    ];
    let selectedTicket = null;

    // Utility for status badge
    function statusClass(status) {
      if (status === "new") return "status status-new";
      if (status === "pending") return "status status-pending";
      if (status === "completed") return "status status-completed";
      return "status";
    }

    // Render ticket list
    function renderTickets(filter = "all") {
      const list = document.getElementById("ticketList");
      list.innerHTML = "";
      let filtered = tickets;
      if (filter !== "all") filtered = tickets.filter(t => t.status === filter);
      if (!filtered.length) {
        list.innerHTML = `<div class="muted" style="margin-top:30px;text-align:center;">No tickets found.</div>`;
        document.getElementById("detailsPanel").hidden = true;
        return;
      }
      filtered.forEach(t => {
        const user = users[t.user_id] || { name: "Unknown", email: "" };
        const div = document.createElement("div");
        div.className = "ticket-item" + (selectedTicket && selectedTicket.id === t.id ? " selected" : "");
        div.innerHTML = `
          <div class="subject">${t.category} &rarr; ${t.subcategory}</div>
          <div class="meta">
            <span>${t.id}</span>
            <span class="${statusClass(t.status)}">${t.status.charAt(0).toUpperCase() + t.status.slice(1)}</span>
            <span>${t.date}</span>
          </div>
          <div class="user">${user.name}</div>
        `;
        div.onclick = () => showDetails(t);
        list.appendChild(div);
      });
    }

    // Show ticket details
    function showDetails(ticket) {
      selectedTicket = ticket;
      const user = users[ticket.user_id] || { name: "Unknown", email: "" };
      document.getElementById("detailsPanel").hidden = false;
      document.getElementById("userAvatar").textContent = user.name[0] || "U";
      document.getElementById("userName").textContent = user.name;
      document.getElementById("userEmail").textContent = user.email;
      document.getElementById("ticketId").textContent = ticket.id;
      document.getElementById("ticketCategory").textContent = ticket.category;
      document.getElementById("ticketSubcategory").textContent = ticket.subcategory;
      document.getElementById("ticketStatus").textContent = ticket.status.charAt(0).toUpperCase() + ticket.status.slice(1);
      document.getElementById("ticketDate").textContent = ticket.date;
      document.getElementById("ticketDescription").textContent = ticket.description;
      renderComments(ticket);
      renderTickets(document.querySelector(".ticket-filters button.active").dataset.filter);
    }

    // Render comments
    function renderComments(ticket) {
      const list = document.getElementById("commentList");
      list.innerHTML = "";
      if (!ticket.comments || !ticket.comments.length) {
        list.innerHTML = `<div class="muted">No remarks yet.</div>`;
        return;
      }
      ticket.comments.forEach(c => {
        const div = document.createElement("div");
        div.className = "comment";
        div.innerHTML = `<strong>${c.by}:</strong> ${c.text} <span style="float:right;color:#888;">${c.date}</span>`;
        list.appendChild(div);
      });
    }

    // Filter buttons
    document.querySelectorAll(".ticket-filters button").forEach(btn => {
      btn.onclick = function() {
        document.querySelectorAll(".ticket-filters button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderTickets(btn.dataset.filter);
        document.getElementById("detailsPanel").hidden = true;
        selectedTicket = null;
      };
    });

    // Mark as completed
    document.getElementById("markCompleteBtn").onclick = function() {
      if (!selectedTicket) return;
      selectedTicket.status = "completed";
      showDetails(selectedTicket);
    };
    // Mark as pending
    document.getElementById("markPendingBtn").onclick = function() {
      if (!selectedTicket) return;
      selectedTicket.status = "pending";
      showDetails(selectedTicket);
    };
    // Add comment
    document.getElementById("addCommentBtn").onclick = function() {
      if (!selectedTicket) return;
      const val = document.getElementById("commentInput").value.trim();
      if (!val) return;
      selectedTicket.comments = selectedTicket.comments || [];
      selectedTicket.comments.push({ by: "Support", text: val, date: new Date().toISOString().slice(0,10) });
      document.getElementById("commentInput").value = "";
      showDetails(selectedTicket);
    };

    // Initial render
    renderTickets("all");
  </script>
</body>
</html>
