<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Support Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./support.css">
</head>

<body>
  <div class="support-dashboard" role="application">

    <aside class="sidebar" role="navigation" aria-label="Support navigation">
      <div class="brand">
        <div class="logo">S</div>
        <div class="acct">
          <div class="name">Support Team</div>
          <div class="sub">Support dashboard</div>
        </div>
      </div>
      <nav class="nav" aria-label="Main navigation">
        <button class="active">Tickets</button>
      </nav>
      <div class="footer">
        <div class="muted-small">Signed in as: support@example.com</div>
        <div style="margin-top:10px;"><a href="../login.html" class="muted-link">Logout</a></div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1>Tickets</h1>
      </div>

      <div class="panel-wrap">

        <section class="tickets-panel panel">
          <div class="ticket-filters">
            <button class="active" data-filter="all">All</button>
            <button data-filter="new">New</button>
            <button data-filter="pending">Pending</button>
            <button data-filter="completed">Completed</button>
          </div>
          <div class="ticket-list" id="ticketList">
          </div>
        </section>

        <section class="details-panel panel" id="detailsPanel" hidden>

          <!-- Compact Details Header-->
          <div class="details-header">

            <!-- Avatar -->
            <div class="avatar" id="userAvatar">U</div>

            <!-- User Info -->
            <div class="user-info">
              <div class="name" id="userName">User Name</div>
              <div class="email" id="userEmail">user@email.com</div>
            </div>

            <!-- Ticket Info-->
            <div class="ticket-info">
              <div class="category" id="ticketCategoryCompact">
                Category (Subcategory)
              </div>
              <div class="status" id="ticketStatusCompact">
                PENDING
              </div>
            </div>
          </div>

          <!-- History Panel -->
          <div class="history-section">
            <div class="history-list" id="historyList"></div>
          </div>

          <!-- CRO Action Panel-->
          <div class="action-panel">

            <div class="action-header">
              <div class="action-title">Add Comment / Update</div>
              <button class="btn btn-outline" id="addCommentBtn">
                💬 Add Comment
              </button>
            </div>

            <textarea id="commentInput" class="comment-input"
              placeholder="Write your update, customer note, or action remark..." rows="3"></textarea>

            <div class="action-buttons">
              <button class="btn btn-success" id="markCompleteBtn">
                ✅ Resolve
              </button>

              <button class="btn btn-warning" id="markPendingBtn">
                ↩️ Return to Customer
              </button>

              <button class="btn btn-danger" id="markRejectedBtn">
                ❌ Reject
              </button>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>
  <script src="./support.js"></script>
</body>

</html>
