<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Support Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./support.css">
</head>
<body>
  <div class="support-dashboard" role="application">
    
    <aside class="sidebar" role="navigation" aria-label="Support navigation">
      <div class="brand">
        <div class="logo">S</div>
        <div class="acct">
          <div class="name">Support Team</div>
          <div class="sub">Support dashboard</div>
        </div>
      </div>
      <nav class="nav" aria-label="Main navigation">
        <button class="active">Tickets</button>
      </nav>
      <div class="footer">
        <div class="muted-small">Signed in as: support@example.com</div>
        <div style="margin-top:10px;"><a href="../login.html" class="muted-link">Logout</a></div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1>Tickets</h1>
      </div>
      
      <div class="panel-wrap">
        
        <section class="tickets-panel panel">
          <div class="ticket-filters">
            <button class="active" data-filter="all">All</button>
            <button data-filter="new">New</button>
            <button data-filter="pending">Pending</button>
            <button data-filter="completed">Completed</button>
          </div>
          <div class="ticket-list" id="ticketList">
            </div>
        </section>

        <section class="details-panel panel" id="detailsPanel" hidden>
          <div class="details-header">
            <div class="avatar" id="userAvatar">U</div>
            <div class="info">
              <div class="name" id="userName">User Name</div>
              <div class="email" id="userEmail">user@email.com</div>
            </div>
          </div>
          
          <div class="details-section">
            <label>Ticket ID:</label>
            <div class="value font-medium" id="ticketId"></div>
            
            <label>Category:</label>
            <div class="value" id="ticketCategory"></div>
            
            <label>Subcategory:</label>
            <div class="value" id="ticketSubcategory"></div>
            
            <label>Status:</label>
            <div class="value" id="ticketStatus"></div>
            
            <label>Date:</label>
            <div class="value muted-text" id="ticketDate"></div>
            
            <label style="align-self: flex-start; margin-top: 8px;">Description:</label>
            <div class="desc" id="ticketDescription"></div>
          </div>
          
          <div class="comment-box">
            <label for="commentInput" class="section-subtitle">Add Comment/Remark:</label>
            <textarea id="commentInput" placeholder="Add a remark or update for this ticket..." rows="3"></textarea>
            <div class="form-actions">
              <button class="btn btn-outline" id="addCommentBtn">Add Comment</button>
            </div>
          </div>

          <div class="details-actions border-bottom">
            <button class="btn btn-success" id="markCompleteBtn">Mark as Completed</button>
            <button class="btn btn-warning" id="markPendingBtn">Mark as Pending</button>
            <button class="btn btn-failure" id="markRejectedBtn">Mark as Rejected</button>
          </div>

          <div class="comment-list" id="commentList"></div>
        </section>

      </div>
    </main>
  </div>
  <script src="./support.js"></script>
</body>
</html>
