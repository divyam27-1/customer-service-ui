<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Manager Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./manager.css">

</head>

<body>

<div class="dashboard">

  <!-- ✅ SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">M</div>
      <div>
        <div id="managerName">Manager</div>
        <div class="muted" id="managerEmail">manager@email.com</div>
      </div>
    </div>

    <nav class="nav">
      <button class="active" onclick="showPage('dashboard')">Dashboard</button>
      <button onclick="showPage('sla')">SLA Monitoring</button>
    </nav>

    <button id="logoutBtn" class="btn-danger">Logout</button>
  </aside>

  <!-- ✅ MAIN -->
  <main class="main">

    <!-- ✅ DASHBOARD -->
    <div id="dashboardPage" class="page">

      <h2>Manager Dashboard</h2>

      <!-- ✅ FILTERS -->
      <div class="filters">
        <button onclick="renderTickets('ALL')">All</button>
        <button onclick="renderTickets('PENDING_CUSTOMER')">Pending Customer</button>
        <button onclick="renderTickets('PENDING_CRO')">Active (CRO)</button>
        <button onclick="renderTickets('PENDING_MANAGER')">Escalated</button>
        <button onclick="renderTickets('CLOSED_RESOLVED')">Resolved</button>
        <button onclick="renderTickets('CLOSED_REJECTED')">Rejected</button>
      </div>

      <div class="layout">

        <!-- ✅ TICKET LIST -->
        <div class="panel">
          <h3>Tickets</h3>
          <div id="ticketList"></div>
        </div>

        <!-- ✅ DETAILS -->
        <div class="panel" id="detailsPanel" hidden>

          <h3>Ticket Details</h3>

          <div class="detail-row"><b>ID:</b> <span id="ticketId"></span></div>
          <div class="detail-row"><b>User:</b> <span id="ticketUser"></span></div>
          <div class="detail-row"><b>Category:</b> <span id="ticketCategory"></span></div>
          <div class="detail-row"><b>Subcategory:</b> <span id="ticketSubcategory"></span></div>
          <div class="detail-row"><b>Status:</b> <span id="ticketStatus"></span></div>
          <div class="detail-row"><b>Description:</b></div>
          <div class="description" id="ticketDescription"></div>

          <!-- ✅ ACTIONS -->
          <div class="actions">
            <button onclick="performAction('RESOLVE')" class="btn-success">Resolve</button>
            <button onclick="performAction('REJECT')" class="btn-danger">Reject</button>
            <button onclick="performAction('RETURN_TO_CUSTOMER')" class="btn-warning">Return to Customer</button>
          </div>

          <!-- ✅ COMMENT -->
          <textarea id="commentBox" placeholder="Add remark..."></textarea>
          <button onclick="performAction('COMMENT')" class="btn-primary">Add Comment</button>

        </div>
      </div>
    </div>

    <!-- ✅ SLA PAGE -->
    <div id="slaPage" class="page" hidden>

      <h2>CRO Performance Dashboard</h2>

      <div class="sla-cards">
        <div class="card">
          <b>Total Tickets</b>
          <div id="slaTotal"></div>
        </div>

        <div class="card">
          <b>Pending CRO</b>
          <div id="slaPending"></div>
        </div>

        <div class="card">
          <b>Resolved</b>
          <div id="slaResolved"></div>
        </div>

        <div class="card">
          <b>Rejected</b>
          <div id="slaRejected"></div>
        </div>
      </div>

      <!-- ✅ CRO TABLE -->
      <div class="panel">
        <h3>CRO Workload</h3>

        <table>
          <thead>
            <tr>
              <th>CRO Name</th>
              <th>Total</th>
              <th>Pending</th>
              <th>Escalated</th>
              <th>Resolved</th>
              <th>Rejected</th>
            </tr>
          </thead>

          <tbody id="croTable"></tbody>

        </table>
      </div>

    </div>

  </main>
</div>

<script src="./manager.js"></script>

</body>
</html>
