    .fp-container {
      max-width: 420px;
      margin: 100px auto;
      padding: 24px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 8px 28px rgba(16,45,83,0.08);
      border: 1px solid rgba(43,154,255,0.12);
    }

    .fp-container h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    .fp-container p {
      text-align: center;
      color: black;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .fp-container input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #e8f2ff;
      margin-bottom: 14px;
    }

    .fp-container button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #2b9aff;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
  
</head>

<body>

  <!-- FIX: added class="fp-container" -->
  <form id="resetForm" class="fp-container">
    <h2>Enter Your New Password</h2>

    <input type="password" id="password" placeholder="New Password" required />
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required />

    <button type="submit">Reset Password</button>
  </form>

<script src = "../js/reset-password.js"></script>

</body>
