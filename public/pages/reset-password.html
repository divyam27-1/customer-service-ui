
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password</title>

  <style>
 .fp-container input,
.fp-container button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  box-sizing: border-box;
  display: block;
}

/* 🔥 FIX HERE */
.fp-container input {
  border: none;               /* remove default uneven border */
  outline: none;
  background: #f9fcff;        /* light background for visibility */
  margin-bottom: 14px;
}

.fp-container button {
  border: none;
  background: #2b9aff;
  color: white;
  font-weight: 600;
  cursor: pointer;
}
  </style>
</head>

<body>

<form id="resetForm">
  <h2 style="text-align:center; margin-bottom:10px;">
    Enter Your New Password
  </h2>

  <input type="password" id="password" placeholder="New Password" />
  <input type="password" id="confirmPassword" placeholder="Confirm Password" />
  <button type="submit">Reset Password</button>
</form>

<script src = "../js/reset-password.js"></script>

</body>
</html>
