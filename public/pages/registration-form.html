
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registration Form</title>

  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="registration-container">
    <section class="card">
      <header class="card-header">
        <h1 class="card-title">Create Account</h1>
        <p class="card-subtitle">Sign up to get started</p>
      </header>

      <form id="registrationForm" class="card-body" method="post" action="/register" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="fullName">Full name</label>
          <input id="fullName" name="name" type="text" placeholder="Jane Doe" required autocomplete="name" />
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter password" required minlength="6" autocomplete="new-password" />
          <small class="hint">Minimum 6 characters</small>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Re-enter password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Re-type password" required autocomplete="new-password" />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Create account</button>
          <a class="muted-link" href="login.html" aria-label="Already have an account">Already have an account?</a>
        </div>

        <div id="formMessage" class="form-message" aria-live="polite"></div>
      </form>
    </section>
  </main>


  <script src="../js/app.js" defer></script>
</body>
</html>
