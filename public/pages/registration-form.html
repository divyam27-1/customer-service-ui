<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registration Form</title>

  <style>
  body {
    margin: 0;
    background: #f5f7fb;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .registration-container {
    width: 100%;
    padding: 20px;
  }

  .card {
    max-width: 420px;
    margin: auto;
    background: white;
    padding: 30px 25px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
  }

  .card-header {
    text-align: center;
    margin-bottom: 20px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
  }

  .form-group input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }

  .hint {
    font-size: 12px;
    color: gray;
  }

  .form-actions {
    margin-top: 20px;
    text-align: center;
  }

  .btn {
    width: 100%;
    padding: 12px;
    background: #0078d4;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
  }

  .btn:hover {
    background: #005fa3;
  }

  .muted-link {
    display: block;
    margin-top: 10px;
    color: #555;
    font-size: 14px;
    text-decoration: none;
  }

  .form-message {
    margin-top: 10px;
    text-align: center;
  }
  </style>
</head>

<body>
  <main class="registration-container">
    <section class="card">

      <header class="card-header">
        <h1>Create Account</h1>
        <p>Sign up to get started</p>
      </header>

      
      <form id="registrationForm">

        <div class="form-group">
          <label>Username</label>
          <input id="username" type="text" required>
        </div>

        <div class="form-group">
          <label>First Name</label>
          <input id="firstName" type="text" required>
        </div>

        <div class="form-group">
          <label>Last Name</label>
          <input id="lastName" type="text" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input id="email" type="email" required>
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input id="phoneNo" type="tel" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input id="password" type="password" required>
          <small class="hint">Minimum 6 characters</small>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input id="confirmPassword" type="password" required>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn">Create Account</button>
          <a class="muted-link" href="login.html">Already have an account?</a>
        </div>

        <div id="formMessage" class="form-message"></div>

      </form>

    </section>
  </main>

  <script>
    document.getElementById("registrationForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const formMessage = document.getElementById("formMessage");

      const data = {
        username: document.getElementById("username").value,
        firstName: document.getElementById("firstName").value,
        lastName: document.getElementById("lastName").value,
        email: document.getElementById("email").value,
        phoneNo: document.getElementById("phoneNo").value,
        password: document.getElementById("password").value,
        confirmPassword: document.getElementById("confirmPassword").value
      };

      // ✅ Password validation
      if (data.password !== data.confirmPassword) {
        formMessage.style.color = "red";
        formMessage.innerText = "❌ Passwords do not match!";
        return;
      }

      try {
        const response = await fetch("http://localhost:8619/api/auth/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "include",
          body: JSON.stringify(data)
        });

        const result = await response.text();

        if (response.ok) {
          formMessage.style.color = "green";
          formMessage.innerText = result;

          // ✅ OPTIONAL REDIRECT
          setTimeout(() => {
            window.location.href = "login.html";
          }, 2000);

        } else {
          formMessage.style.color = "red";
          formMessage.innerText = result;
        }

      } catch (error) {
        formMessage.style.color = "red";
        formMessage.innerText = "❌ Error: " + error.message;
      }
    });
  </script>

</body>
</html>
