
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forgot Password</title>
  

  <style>
    .fp-container {
      max-width: 420px;
      margin: 100px auto;
      padding: 24px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 8px 28px rgba(16,45,83,0.08);
      border: 1px solid rgba(43,154,255,0.12);
    }

    .fp-container h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    .fp-container p {
      text-align: center;
      color: black;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .fp-container input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #e8f2ff;
      margin-bottom: 14px;
    }

    .fp-container button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #2b9aff;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="fp-container">
  <p><b>Enter your email address to reset your password</b></p>

  <form id="forgotForm">
    <input type="email" id="email" placeholder="Enter your email address" required />
    <button type="submit">Send Reset Link</button>
  </form>
</div>

<script>
 
document.addEventListener("DOMContentLoaded", function () {

  const form = document.getElementById("forgotForm");

  if (form) {
    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const emailInput = document.getElementById("email");
      const email = emailInput ? emailInput.value.trim() : "";

      if (!email) {
        alert("Please enter your email ❗");
        return;
      }

      // ✅ API call
      fetch(`http://localhost:8619/api/auth/forgotPassword?email=${encodeURIComponent(email)}`, {
        method: "POST"
      })
      .then(response => {
        if (!response.ok) throw new Error("Request failed");
        return response.text();
      })
      .then(data => {
        alert("Reset link sent to your email ✅");
      })
      .catch(error => {
        alert("Failed to send reset link ❌");
        console.error(error);
      });

    });
  }

});

</script>

</body>
</html>
