<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Customer Dashboard</title>
  <link rel="stylesheet" href="./customer.css">
</head>

<body>
  <div class="edge-dashboard">

    <!-- ✅ SIDEBAR -->
    <aside class="sidebar">
      <div class="brand">
        
        <div class="acct">
          <div class="name" id="userName">User</div>
          <div class="muted" id="userEmail">Email</div>
        </div>
      </div>

      <nav class="nav" id="sideNav">
        <button class="active" data-target="dashboard">Overview</button>
        <button data-target="viewTickets">View Tickets</button>
        <button data-target="raiseTicket">Raise Ticket</button>
        <button data-target="cardServices">Debit Card Services</button>
        
      </nav>

      <div class="footer">
        <div class="name">Signed in : User</div>
        <button id="logoutBtn" class="btn btn-danger">Logout</button>
      </div>
    </aside>

    <!-- ✅ MAIN -->
    <main class="main">

      <div class="topbar">
        <h1 id="pageTitle">Overview</h1>
        <div>
          <button class="btn btn-ghost" id="refreshBtn">Refresh</button>
          <button class="btn btn-primary" id="newTicketBtn">Raise Ticket</button>
        </div>
      </div>

      <div class="panel-wrap">

        <!-- ✅ LEFT SUMMARY -->
        <div class="left-col">
          <section class="panel">
            <h2>Summary</h2>

            <div style="display:flex;gap:12px;margin-top:12px">
              <div class="summary-card">
                <div class="muted">Open Tickets</div>
                <div id="openCount">0</div>
              </div>

              <div class="summary-card">
                <div class="muted">Card Requests</div>
                <div id="cardCount">0</div>
              </div>
            </div>

            <h3>Recent Tickets</h3>
            <div id="ticketList" class="ticket-list"></div>
          </section>
        </div>

        <!-- ✅ CONTENT PANEL -->
        <section class="panel">

          <!-- DASHBOARD -->
          <div id="dashboard" class="view">
            <h2>Welcome</h2>
            <p class="muted">Use the menu to manage your requests.</p>
          </div>

          <!-- ✅ VIEW TICKETS -->
          <div id="viewTickets" class="view" hidden>
            <h2>Your Tickets</h2>
            <div id="ticketsContainer" class="ticket-list"></div>
          </div>

          <!-- ✅ RAISE TICKET -->
          <div id="raiseTicket" class="view" hidden>
            <h2>Raise Ticket</h2>

            <form id="raiseForm">

              <div class="two-col">
                <div class="form-row">
                  <label>Category</label>
                  <select id="category" required>
                    <option value="">Select</option>
                    <option>Internet Banking</option>
                    <option>Account Services</option>
                    <option>Complaints</option>
                  </select>
                </div>

                <div class="form-row">
                  <label>Subcategory</label>
                  <select id="subcategory" required></select>
                </div>
              </div>

              <div class="form-row">
                <label>Description</label>
                <textarea id="description" required></textarea>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn-primary">Submit</button>
                <button type="reset" class="btn btn-ghost">Reset</button>
              </div>

              <div id="raiseMsg" class="muted"></div>

            </form>
          </div>

          <!-- ✅ CARD SERVICES -->
          <div id="cardServices" class="view" hidden>
            <h2>Debit Card Services</h2>

            <form id="cardForm">

              <div class="two-col">
                <div class="form-row">
                  <label>Service</label>
                  <select id="cardServiceType" required>
                    <option value="">Select</option>
                    <option value="BLOCKCARD">Block card</option>
                    <option value="UNBLOCKCARD">Unblock card</option>
                    <option value="LOSTCARD">Lost card reporting</option>
                  </select>
                </div>

                <div class="form-row">
                  <label>Card Number (last 4 digits)</label>
                  <input id="debitCardNumber" maxlength="4" required />
                </div>
              </div>

              <div class="form-row">
                <label>Comment</label>
                <textarea id="cardComment" required></textarea>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn-primary">Submit</button>
              </div>

              <div style="margin-top:15px;">
                <button id="createCardBtn" class="btn btn-primary">
                  Create Debit Card
                </button>
              </div>

              <div id="createCardMsg" style="margin-top:8px;"></div>

              <div id="cardMsg"></div>

            </form>
          </div>

          

        </section>

      </div>
    </main>

  </div>

  <script src="./customer.js"></script>
</body>

</html>
